<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ttb AI Audio Assessment</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: '#0A192F',    
                        brandBlue: '#1E40AF',    
                        brandLight: '#DBEAFE',   
                        accentOrange: '#F97316', 
                        success: '#10B981',
                        danger: '#EF4444',
                        surface: '#F4F7FE',      
                        textMain: '#1E293B',
                        textMuted: '#64748B'
                    },
                    fontFamily: { sans: ['Prompt', 'Nunito', 'sans-serif'] },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background-color: #E2E8F0; font-family: 'Nunito', 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .app-container { width: 100%; max-width: 540px; background-color: #F4F7FE; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); overflow: hidden; }
        @media (min-width: 640px) { body { padding: 20px 0; } .app-container { min-height: 90vh; max-height: 95vh; border-radius: 40px; } }
        .btn-3d { box-shadow: 0 8px 20px -6px rgba(30, 64, 175, 0.4), 0 4px 6px -2px rgba(30, 64, 175, 0.1); transition: all 0.2s; }
        .btn-3d:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 25px -6px rgba(30, 64, 175, 0.5); }
        .btn-3d:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 4px 10px -4px rgba(30, 64, 175, 0.4); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .mic-waves::before, .mic-waves::after {
            content: ''; position: absolute; border-radius: 50%; width: 100%; height: 100%;
            background-color: rgba(239, 68, 68, 0.4); z-index: -1; animation: ripple 1.5s infinite ease-out;
        }
        .mic-waves::after { animation-delay: 0.75s; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root" class="w-full flex justify-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        const GEMINI_API_KEY = "AIzaSyDhCVCNrx2WiNh9pDT24HI5eomrt4KtuUg";
        const SUPABASE_URL = "https://lyfqqrofqbyfezwxwhph.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5ZnFxcm9mcWJ5ZmV6d3h3aHBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0ODc3MTAsImV4cCI6MjA4OTA2MzcxMH0.U5rhRSSTplQbcXBL16odRMRL26dy1RCxC_6jkHjhaWA";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 2. ICONS
        // ==========================================
        const Icons = {
            Mic: () => <svg width="32" height="32" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>,
            Stop: () => <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>,
            Refresh: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>,
            Play: () => <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
            ChevronLeft: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            Exit: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        };

        // ==========================================
        // 3. MAIN APP
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [rubrics, setRubrics] = useState([]);
            const [submissions, setSubmissions] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const initData = async () => {
                    try {
                        const { data: rData } = await supabase.from('trainer_rubrics').select('*');
                        if (rData) setRubrics(rData);
                    } catch (e) { console.error("Error loading rubrics", e); }
                    
                    // ✅ Fix 1: ดึงประวัติการ Login จาก LocalStorage ป้องกันเบราว์เซอร์รีเฟรชตอนขอไมค์
                    const savedUser = localStorage.getItem('ttb_audio_user');
                    if (savedUser) {
                        const parsedUser = JSON.parse(savedUser);
                        setUser(parsedUser);
                        await loadUserSubmissions(parsedUser.employee_id);
                    }
                    
                    setIsLoading(false);
                };
                initData();
            }, []);

            const loadUserSubmissions = async (empId) => {
                const { data } = await supabase.from('audio_submissions').select('*').eq('employee_id', empId).order('created_at', { ascending: false });
                if(data) setSubmissions(data);
            };

            const handleLogin = async (empId, fName) => {
                setIsLoading(true);
                const { data } = await supabase.from('users').select('*').eq('employee_id', empId).ilike('first_name_en', fName).single();
                if (data && data.role === 'Candidate') {
                    setUser(data);
                    // ✅ บันทึก Login Session
                    localStorage.setItem('ttb_audio_user', JSON.stringify(data));
                    await loadUserSubmissions(data.employee_id);
                } else {
                    alert('ข้อมูลไม่ถูกต้อง หรือคุณไม่มีสิทธิ์เข้าใช้งานระบบนี้');
                }
                setIsLoading(false);
            };
            
            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('ttb_audio_user');
            };

            if (isLoading) return <div className="h-screen w-full flex items-center justify-center bg-surface text-brandBlue font-black text-xl"><span className="animate-spin mr-3">⏳</span> Loading...</div>;

            return (
                <div className="app-container">
                    {!user ? <LoginScreen onLogin={handleLogin} /> : <Dashboard user={user} rubrics={rubrics} submissions={submissions} refreshData={() => loadUserSubmissions(user.employee_id)} onLogout={handleLogout} />}
                </div>
            );
        }

        // ==========================================
        // 4. LOGIN SCREEN
        // ==========================================
        function LoginScreen({ onLogin }) {
            const [empId, setEmpId] = useState('');
            const [fName, setFName] = useState('');

            return (
                <div className="flex-1 flex flex-col justify-center px-8 bg-surface relative overflow-hidden">
                    <div className="absolute top-[-100px] left-[-100px] w-64 h-64 bg-brandLight rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
                    <div className="text-center mb-8 relative z-10 pt-10">
                        <div className="w-20 h-20 bg-brandNavy rounded-[24px] flex items-center justify-center text-4xl mx-auto mb-6 shadow-soft-3d text-white transform rotate-3">🎙️</div>
                        <h1 className="text-3xl font-black text-brandNavy tracking-tight">AI Audio Assessment</h1>
                        <p className="text-brandBlue font-bold mt-2">สนามซ้อมสัมภาษณ์ด้วยเสียง 15/5</p>
                    </div>
                    <form onSubmit={(e) => { e.preventDefault(); onLogin(empId, fName); }} className="space-y-4 relative z-10 pb-10">
                        <input type="text" value={empId} onChange={e => setEmpId(e.target.value)} className="w-full p-4 rounded-[20px] bg-white border-2 border-transparent focus:border-brandBlue outline-none font-bold text-textMain transition-all shadow-sm" placeholder="Employee ID" required />
                        <input type="text" value={fName} onChange={e => setFName(e.target.value)} className="w-full p-4 rounded-[20px] bg-white border-2 border-transparent focus:border-brandBlue outline-none font-bold text-textMain transition-all shadow-sm" placeholder="First Name (English)" required />
                        <button type="submit" className="w-full bg-brandNavy text-white font-black py-4 rounded-[20px] btn-3d mt-6 text-lg tracking-wide uppercase">เข้าสู่ระบบ</button>
                    </form>
                    <div className="mt-auto text-center pb-6 text-[10px] font-black text-gray-400 uppercase tracking-widest">Powered by : PRU ACADEMY <span className="text-brandBlue">[ttb training team]</span></div>
                </div>
            );
        }

        // ==========================================
        // 5. DASHBOARD & EXAM FLOW
        // ==========================================
        function Dashboard({ user, rubrics, submissions, refreshData, onLogout }) {
            const [view, setView] = useState('list'); // 'list', 'exam', 'result'
            const [examQuestions, setExamQuestions] = useState([]); // เก็บคำถาม 3 ข้อ
            const [currentStep, setCurrentStep] = useState(0); // ลำดับข้อ 0, 1, 2
            const [lastResult, setLastResult] = useState(null);

            const startExam = async () => {
                if(rubrics.length === 0) return alert("ไม่พบข้อมูลคำถามในระบบ");
                
                try {
                    // ✅ Fix 2: ขอสิทธิเข้าถึงไมโครโฟนล่วงหน้าก่อนเริ่มสุ่มคำถาม ป้องกันหน้าจอเด้ง
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(track => track.stop()); // ขอเสร็จแล้วปิดไมค์ไว้ก่อน
                    
                    // สุ่มคำถาม 3 หมวดหมู่ (Product, Invest, Objection)
                    const pkQs = rubrics.filter(r => r.category === 'Product Knowledge');
                    const invQs = rubrics.filter(r => r.category === 'Investment Knowledge');
                    const objQs = rubrics.filter(r => r.category === 'Objection Handling');
                    
                    if(pkQs.length === 0 || invQs.length === 0 || objQs.length === 0) {
                        return alert("คำถามในฐานข้อมูลมีไม่ครบทั้ง 3 หมวดหมู่");
                    }

                    const q1 = pkQs[Math.floor(Math.random() * pkQs.length)];
                    const q2 = invQs[Math.floor(Math.random() * invQs.length)];
                    const q3 = objQs[Math.floor(Math.random() * objQs.length)];

                    setExamQuestions([q1, q2, q3]);
                    setCurrentStep(0);
                    setView('exam');
                    
                } catch (err) {
                    alert("กรุณาอนุญาตการใช้งานไมโครโฟน (Allow Microphone) ในการตั้งค่าเบราว์เซอร์ เพื่อเริ่มการสอบ");
                }
            };
            
            const handleExamComplete = (res) => {
                setLastResult(res);
                refreshData();
                setView('result');
            };
            
            const handleNextQuestion = () => {
                if (currentStep < 2) {
                    setCurrentStep(currentStep + 1);
                    setView('exam');
                } else {
                    setView('list'); // จบ 3 ข้อ กลับหน้าหลัก
                }
            };

            if (view === 'exam') return <RecordingScreen user={user} question={examQuestions[currentStep]} step={currentStep} onCancel={() => setView('list')} onComplete={handleExamComplete} />;
            if (view === 'result') return <ResultScreen result={lastResult} step={currentStep} onNext={handleNextQuestion} />;

            return (
                <div className="flex-1 flex flex-col h-full bg-surface animate-fade-in">
                    <div className="bg-brandNavy text-white p-8 pb-12 rounded-b-[40px] shadow-lg relative overflow-hidden shrink-0">
                        <div className="absolute right-[-20px] top-6 w-40 h-40 bg-brandBlue rounded-full opacity-50 blur-3xl"></div>
                        <div className="flex justify-between items-start relative z-10">
                            <div><p className="text-brandLight text-xs font-bold uppercase tracking-widest mb-1">Candidate Profile</p><h2 className="text-2xl font-black">{user.first_name_en} {user.last_name_en}</h2><p className="text-sm font-bold opacity-80 mt-1">{user.employee_id} | {user.rh}</p></div>
                            <button onClick={onLogout} className="text-white/50 hover:text-white transition-colors bg-white/10 p-2 rounded-xl"><Icons.Exit /></button>
                        </div>
                    </div>

                    <div className="px-6 -mt-6 relative z-10 flex-1 flex flex-col pb-6">
                        <div className="card-3d p-6 mb-6 text-center">
                            <div className="w-16 h-16 bg-brandLight text-brandBlue rounded-full flex items-center justify-center text-3xl mx-auto mb-4">🎙️</div>
                            <h3 className="font-black text-brandNavy text-lg mb-2">ทดสอบตอบคำถามด้วยเสียง</h3>
                            <p className="text-sm text-textMuted font-bold mb-6">ระบบจะสุ่มคำถาม 3 ข้อ (ครบทุกหมวด) ให้คุณอัดเสียงตอบ และ AI จะประเมินคะแนนให้ทันทีทีละข้อ</p>
                            <button onClick={startExam} className="w-full bg-brandBlue text-white font-black py-4 rounded-[20px] btn-3d uppercase tracking-widest text-sm flex items-center justify-center"><span className="text-xl mr-2">🎯</span> เริ่มสอบ 3 ข้อ</button>
                        </div>

                        <div className="flex justify-between items-center mb-4 mt-2">
                            <h4 className="font-black text-brandNavy text-sm uppercase tracking-widest">ประวัติการทดสอบของคุณ</h4>
                            <span className="bg-white text-brandBlue font-black text-xs px-3 py-1 rounded-full shadow-sm">{submissions.length} Records</span>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto space-y-4 pr-2 pb-10">
                            {submissions.length === 0 ? (
                                <div className="text-center py-10 bg-white/50 rounded-[24px] border border-white"><p className="text-gray-400 font-bold text-sm">ยังไม่มีประวัติการสอบ</p></div>
                            ) : submissions.map(sub => (
                                <div key={sub.id} onClick={() => { setLastResult(sub); setView('result'); }} className="bg-white p-5 rounded-[24px] shadow-sm border border-blue-50 cursor-pointer hover:shadow-md transition-all group">
                                    <div className="flex justify-between items-start mb-3">
                                        <span className="bg-optGray text-textMuted text-[10px] font-black px-2 py-1 rounded-lg uppercase">{sub.category}</span>
                                        <span className={`font-black text-lg ${sub.ai_score >= 8 ? 'text-success' : 'text-danger'}`}>{sub.ai_score}/10</span>
                                    </div>
                                    <p className="font-bold text-sm text-brandNavy line-clamp-2 leading-relaxed">{sub.question}</p>
                                    <p className="text-[10px] text-gray-400 font-bold mt-3 text-right">{new Date(sub.created_at).toLocaleString('th-TH')}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. RECORDING SCREEN (Audio + Supabase + Gemini)
        // ==========================================
        function RecordingScreen({ user, question, step, onCancel, onComplete }) {
            const [status, setStatus] = useState('idle'); // idle, recording, processing
            const [time, setTime] = useState(0);
            const [prepTime, setPrepTime] = useState(120); // ✅ เวลาเตรียมตัว 2 นาที (120 วินาที)
            const [audioUrl, setAudioUrl] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            
            const mediaRecorder = useRef(null);
            const audioChunks = useRef([]);
            const timerRef = useRef(null);
            const recordingTimeRef = useRef(0); // ใช้เก็บเวลาอัดเสียงเพื่อความแม่นยำ
            const mimeType = useRef('');

            // ✅ Effect สำหรับนับเวลาเตรียมตัว 2 นาที
            useEffect(() => {
                let pTimer;
                if (status === 'idle' && prepTime > 0) {
                    pTimer = setInterval(() => setPrepTime(p => p - 1), 1000);
                } else if (status === 'idle' && prepTime <= 0) {
                    handlePrepTimeout();
                }
                return () => clearInterval(pTimer);
            }, [status, prepTime]);

            // ✅ Effect สำหรับจับเวลาขณะอัดเสียง
            useEffect(() => {
                return () => { if(timerRef.current) clearInterval(timerRef.current); };
            }, []);

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60).toString().padStart(2, '0');
                const s = (secs % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // ✅ ฟังก์ชันปรับตกอัตโนมัติหากไม่ยอมอัดเสียงใน 2 นาที
            const handlePrepTimeout = async () => {
                setStatus('processing');
                setErrorMsg('หมดเวลาเตรียมตัว 2 นาที! ระบบกำลังประเมินผลเป็น 0 คะแนน...');
                try {
                    const newRecord = {
                        employee_id: user.employee_id,
                        first_name_en: user.first_name_en,
                        question: question.question,
                        category: question.category,
                        audio_url: null,
                        transcript: "[ ไม่มีการบันทึกเสียง - หมดเวลาเตรียมตัว 2 นาที ]",
                        ai_score: 0,
                        ai_feedback: "ผู้สอบไม่ได้เริ่มบันทึกเสียงภายในเวลาที่กำหนด (2 นาที) เพื่อป้องกันการเตรียมสคริปต์ ระบบจึงทำการปรับตกและให้ 0 คะแนนในข้อนี้"
                    };
                    const { data: dbData, error: dbErr } = await supabase.from('audio_submissions').insert([newRecord]).select().single();
                    if(dbErr) throw new Error("บันทึกข้อมูลลงฐานข้อมูลไม่สำเร็จ (Database Error)");
                    
                    onComplete(dbData);
                } catch (err) {
                    console.error(err);
                    setErrorMsg("เกิดข้อผิดพลาดจากฐานข้อมูล: " + err.message);
                    setStatus('idle');
                }
            };

            const startRecording = async () => {
                setErrorMsg('');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    // ลองหา mimeType ที่ Browser รองรับ
                    const types = ['audio/webm;codecs=opus', 'audio/mp4', 'audio/webm', 'audio/aac', 'audio/ogg'];
                    for (let type of types) {
                        if (MediaRecorder.isTypeSupported(type)) { mimeType.current = type; break; }
                    }
                    if(!mimeType.current) mimeType.current = 'audio/webm'; // fallback

                    mediaRecorder.current = new MediaRecorder(stream, { mimeType: mimeType.current });
                    audioChunks.current = [];

                    mediaRecorder.current.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunks.current.push(e.data);
                    };

                    mediaRecorder.current.onstop = () => {
                        // ✅ ป้องกันปัญหาอัดเสียงสั้นเกินไป หรือไม่มีเสียง
                        if (recordingTimeRef.current < 2 || audioChunks.current.length === 0) {
                            setErrorMsg("⚠️ เวลาบันทึกเสียงสั้นเกินไป กรุณาพูดอธิบายรายละเอียดให้ชัดเจนแล้วกดบันทึกใหม่");
                            setStatus('idle');
                            return;
                        }

                        const audioBlob = new Blob(audioChunks.current, { type: mimeType.current });
                        if (audioBlob.size < 1024) { // ขนาดไฟล์เล็กเกินไป (ไม่ถึง 1KB)
                            setErrorMsg("⚠️ ไม่พบข้อมูลเสียง หรือไฟล์เสียงมีขนาดเล็กผิดปกติ กรุณาตรวจสอบไมโครโฟนและลองใหม่");
                            setStatus('idle');
                            return;
                        }

                        const url = URL.createObjectURL(audioBlob);
                        setAudioUrl(url);
                        processSubmission(audioBlob); // ส่งสอบอัตโนมัติเมื่อกดหยุด
                    };

                    mediaRecorder.current.start(200);
                    setStatus('recording');
                    setTime(0);
                    recordingTimeRef.current = 0;
                    
                    timerRef.current = setInterval(() => {
                        setTime(t => t + 1);
                        recordingTimeRef.current += 1;
                    }, 1000);
                } catch (err) {
                    console.error("Mic error:", err);
                    setErrorMsg("⚠️ ไม่อนุญาตให้ใช้ไมโครโฟน หรือไม่พบไมโครโฟน กรุณาตั้งค่าเบราว์เซอร์");
                }
            };

            const stopRecording = () => {
                if (mediaRecorder.current && status === 'recording') {
                    mediaRecorder.current.stop();
                    mediaRecorder.current.stream.getTracks().forEach(track => track.stop()); // ปิดไมค์
                    clearInterval(timerRef.current);
                    setStatus('processing');
                }
            };

            // 🔥 หัวใจหลัก: อัปโหลด Supabase + ส่งให้ Gemini ตรวจ (พร้อม Error Handling ละเอียด)
            const processSubmission = async (audioBlob) => {
                try {
                    // 1. Upload to Supabase Storage
                    const fileName = `${user.employee_id}_${Date.now()}.${mimeType.current.includes('mp4') ? 'mp4' : 'webm'}`;
                    const { data: uploadData, error: uploadErr } = await supabase.storage.from('exam_audios').upload(fileName, audioBlob, { contentType: mimeType.current });
                    if(uploadErr) throw new Error("อัปโหลดไฟล์เสียงไม่สำเร็จ (Supabase Storage Error)");
                    
                    const publicUrl = supabase.storage.from('exam_audios').getPublicUrl(fileName).data.publicUrl;

                    // 2. Convert Blob to Base64 for Gemini
                    const base64Audio = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => resolve(reader.result.split(',')[1]);
                        reader.onerror = () => reject(new Error("ไม่สามารถอ่านไฟล์เสียงในอุปกรณ์ของคุณได้"));
                    });

                    // 3. Call Gemini API (Audio Understanding)
                    const sysPrompt = `คุณคือหัวหน้าเทรนเนอร์ผู้เชี่ยวชาญผลิตภัณฑ์ 'ttb US Multi-Asset Index Principal Protect 15/5'
จงฟังไฟล์เสียงคำตอบของผู้สอบ (ซึ่งอาจมีเสียงรบกวนหรือคำศัพท์ทับศัพท์เฉพาะทาง)
หน้าที่ของคุณคือ:
1. ถอดความ (Transcript) สิ่งที่ผู้สอบพูดออกมาให้แม่นยำที่สุด
2. ประเมินคะแนน (1 ถึง 10 คะแนน) โดยอ้างอิงจากเกณฑ์ (Rubrics) ที่ให้ไว้
3. ให้คำวิจารณ์ (Feedback) ว่าผู้สอบทำได้ดีตรงไหน และขาดประเด็นอะไรไป

[คำถาม]: ${question.question}
[เกณฑ์ 9-10 คะแนน]: ${question.score5}
[เกณฑ์ 7-8 คะแนน]: ${question.score4}
[เกณฑ์ 1-6 คะแนน]: ${question.score123}

ตอบกลับเป็นรูปแบบ JSON 100% เท่านั้น โดยใช้คีย์ดังนี้:
{"transcript": "ข้อความ...", "score": 8, "feedback": "คำวิจารณ์..."}`;

                    const payload = {
                        contents: [{
                            parts: [
                                { text: sysPrompt },
                                { inlineData: { mimeType: mimeType.current.split(';')[0], data: base64Audio } }
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    };

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    
                    if (!res.ok) {
                        throw new Error(`การเชื่อมต่อระบบ AI ขัดข้อง (API Timeout / Error ${res.status})`);
                    }

                    const aiData = await res.json();
                    
                    if (!aiData.candidates || aiData.candidates.length === 0) {
                        throw new Error("AI ไม่สามารถตอบสนองได้ กรุณาลองใหม่อีกครั้ง");
                    }

                    let aiResult;
                    try {
                        aiResult = JSON.parse(aiData.candidates[0].content.parts[0].text);
                        if (aiResult.score === undefined || !aiResult.transcript) throw new Error("Invalid Output Format");
                    } catch(e) { 
                        console.error("JSON Parse Error", e);
                        throw new Error("เสียงไม่ชัดเจน หรือ AI ไม่สามารถถอดความและให้คะแนนจากเสียงนี้ได้ กรุณาบันทึกใหม่");
                    }

                    // 4. Save everything to Supabase DB
                    const newRecord = {
                        employee_id: user.employee_id,
                        first_name_en: user.first_name_en,
                        question: question.question,
                        category: question.category,
                        audio_url: publicUrl,
                        transcript: aiResult.transcript,
                        ai_score: aiResult.score,
                        ai_feedback: aiResult.feedback
                    };

                    const { data: dbData, error: dbErr } = await supabase.from('audio_submissions').insert([newRecord]).select().single();
                    if(dbErr) throw new Error("บันทึกข้อมูลลงฐานข้อมูลไม่สำเร็จ (Database Error)");

                    // 5. Done! Show result
                    onComplete(dbData);

                } catch (err) {
                    console.error("Processing Error:", err);
                    setErrorMsg(`❌ ${err.message}`);
                    setStatus('idle');
                }
            };

            return (
                <div className="flex-1 flex flex-col h-full bg-surface animate-slide-up relative">
                    <div className="p-6 flex justify-between items-center border-b border-gray-100 bg-white z-10">
                        {status === 'idle' ? <button onClick={onCancel} className="text-textMuted"><Icons.ChevronLeft /></button> : <div className="w-6"></div>}
                        <h2 className="font-black text-brandNavy uppercase tracking-widest text-xs">Audio Assessment ({step + 1}/3)</h2>
                        <div className="w-6"></div>
                    </div>

                    <div className="flex-1 p-6 overflow-y-auto flex flex-col items-center">
                        <span className="bg-optGray text-brandBlue text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest mb-4">{question.category}</span>
                        <div className="bg-white p-6 rounded-[28px] shadow-sm border border-blue-50 w-full mb-8 text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-brandLight"></div>
                            <p className="font-bold text-brandNavy text-lg leading-relaxed">{question.question}</p>
                        </div>

                        {errorMsg && <div className="bg-red-50 text-danger p-4 rounded-xl text-sm font-bold w-full text-center mb-6 border border-red-100">{errorMsg}</div>}

                        <div className="mt-auto mb-10 flex flex-col items-center justify-center w-full">
                            {status === 'idle' && (
                                <div className="text-center animate-fade-in w-full">
                                    {/* ✅ หน้าจอแสดงเวลานับถอยหลัง 2 นาที (เปลี่ยนเป็นสีแดงเตือนเมื่อเหลือน้อยกว่า 30 วิ) */}
                                    <div className={`mb-6 p-4 rounded-2xl border-2 transition-colors ${prepTime <= 30 ? 'bg-red-50 border-red-200 text-danger animate-pulse' : 'bg-blue-50 border-blue-100 text-brandBlue'}`}>
                                        <p className="text-xs font-black uppercase tracking-widest mb-1">เวลาเตรียมตัว (ห้ามเกิน 2 นาที)</p>
                                        <p className="text-3xl font-black">{formatTime(prepTime)}</p>
                                        {prepTime <= 30 && <p className="text-xs font-bold mt-1 text-danger">⚠️ รีบกดบันทึกเสียง หากหมดเวลาจะได้ 0 คะแนนทันที</p>}
                                    </div>
                                    <p className="text-textMuted text-sm font-bold mb-6">กดปุ่มไมโครโฟนเพื่อเริ่มบันทึกเสียงตอบคำถาม</p>
                                    <button onClick={startRecording} className="w-24 h-24 bg-brandBlue text-white rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(30,64,175,0.4)] hover:scale-105 transition-transform mx-auto"><Icons.Mic /></button>
                                </div>
                            )}

                            {status === 'recording' && (
                                <div className="text-center animate-fade-in w-full">
                                    <p className="text-danger font-black text-2xl mb-8 animate-pulse-fast">{formatTime(time)}</p>
                                    <div className="relative flex justify-center items-center w-full mb-6">
                                        <button onClick={stopRecording} className="w-24 h-24 bg-danger text-white rounded-full flex items-center justify-center relative z-10 mic-waves shadow-lg"><Icons.Stop /></button>
                                    </div>
                                    <p className="text-textMuted text-xs font-bold uppercase tracking-widest">Recording... Tap square to stop & submit</p>
                                </div>
                            )}

                            {status === 'processing' && (
                                <div className="text-center animate-fade-in w-full bg-white p-8 rounded-[32px] border border-blue-50 shadow-sm">
                                    <div className="text-5xl mb-4 animate-bounce">🤖</div>
                                    <h3 className="font-black text-brandNavy text-lg mb-2">AI กำลังวิเคราะห์เสียงของคุณ</h3>
                                    <p className="text-xs font-bold text-textMuted">ระบบกำลังถอดความและประเมินคะแนน<br/>กรุณารอสักครู่ ห้ามปิดหน้าจอ...</p>
                                    <div className="w-full bg-gray-100 h-2 rounded-full mt-6 overflow-hidden">
                                        <div className="w-1/2 h-full bg-brandBlue rounded-full animate-[pulse_1s_ease-in-out_infinite] mx-auto"></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 7. RESULT SCREEN (Show AI Feedback)
        // ==========================================
        function ResultScreen({ result, step, onNext }) {
            if(!result) return null;
            const isPass = result.ai_score >= 8;
            const isLast = step === 2;

            return (
                <div className="flex-1 flex flex-col h-full bg-surface animate-slide-up relative">
                    <div className="bg-brandNavy text-white pt-10 pb-8 px-6 rounded-b-[40px] shadow-lg relative overflow-hidden shrink-0">
                        <div className="absolute right-[-20px] top-6 w-40 h-40 bg-brandBlue rounded-full opacity-50 blur-3xl"></div>
                        <div className="relative z-10 flex justify-between items-end mt-4">
                            <div><p className="text-brandLight text-[10px] font-black uppercase tracking-widest mb-1">AI Result (Question {step + 1}/3)</p><h2 className="text-2xl font-black">{isPass ? 'Good Job! 🎉' : 'Needs Improvement'}</h2></div>
                            <div className="text-right"><span className={`text-4xl font-black ${isPass ? 'text-success' : 'text-accentOrange'}`}>{result.ai_score}<span className="text-lg text-white/50">/10</span></span></div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 space-y-6 pb-28">
                        <div className="bg-white p-6 rounded-[28px] shadow-sm border border-gray-100">
                            <p className="text-[10px] font-black text-textMuted uppercase tracking-widest mb-2">Question</p>
                            <p className="font-bold text-brandNavy text-sm leading-relaxed">{result.question}</p>
                            
                            {result.audio_url && (
                                <div className="mt-4 pt-4 border-t border-gray-50">
                                    <p className="text-[10px] font-black text-textMuted uppercase tracking-widest mb-2">Your Audio</p>
                                    <audio controls src={result.audio_url} className="w-full h-10 outline-none"></audio>
                                </div>
                            )}
                        </div>

                        <div className="bg-brandLight/30 p-6 rounded-[28px] border border-blue-100">
                            <p className="text-[10px] font-black text-brandBlue uppercase tracking-widest mb-3 flex items-center"><span className="text-lg mr-2">🎙️</span> Speech to Text (สิ่งที่คุณพูด)</p>
                            <p className="text-sm font-medium text-textMain leading-loose italic bg-white p-4 rounded-[20px] shadow-inner-soft">"{result.transcript}"</p>
                        </div>

                        <div className="bg-white p-6 rounded-[28px] shadow-sm border border-gray-100">
                            <p className="text-[10px] font-black text-textMuted uppercase tracking-widest mb-3 flex items-center"><span className="text-lg mr-2">🤖</span> AI Feedback & Coaching</p>
                            <p className="text-[13px] font-bold text-gray-700 leading-relaxed whitespace-pre-line">{result.ai_feedback}</p>
                        </div>
                    </div>
                    
                    {/* ✅ ปุ่มกดไปข้อถัดไป หรือ ปุ่มเสร็จสิ้น */}
                    <div className="absolute bottom-0 w-full bg-white px-6 py-5 border-t border-gray-50 z-20">
                        <button onClick={onNext} className={`w-full font-black py-4 rounded-[20px] btn-3d uppercase tracking-widest text-sm transition-colors ${isLast ? 'bg-success text-white hover:bg-green-600' : 'bg-brandBlue text-white hover:bg-blue-700'}`}>
                            {isLast ? 'เสร็จสิ้นการสอบ (Finish)' : 'ดำเนินการต่อข้อถัดไป (Next)'}
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
