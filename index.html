<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Update - ttb Certification</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#0A1128',
                        primary: '#3A86FF',
                        accent: '#00F5D4',
                    },
                    fontFamily: { sans: ['Prompt', 'Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #0A1128; 
            font-family: 'Nunito', 'Prompt', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .glass-panel { 
            background: rgba(28, 37, 65, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .btn-press { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- พื้นหลัง (Background Glows) -->
    <div class="absolute top-[-20%] left-[-10%] w-[400px] h-[400px] bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[400px] h-[400px] bg-accent/10 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- การ์ดแจ้งเตือน (Notice Card) -->
    <div class="glass-panel p-8 md:p-10 rounded-[40px] max-w-md w-full text-center relative z-10 shadow-[0_20px_40px_-10px_rgba(0,0,0,0.5)] transform transition-all animate-[slideUp_0.5s_ease-out]">
        
        <!-- ไอคอนแจ้งเตือน -->
        <div class="w-20 h-20 bg-gradient-to-br from-primary to-accent rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_20px_rgba(58,134,255,0.4)]">
            <svg width="40" height="40" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        </div>
        
        <h2 class="text-2xl font-black text-white mb-4 tracking-wide">ประกาศอัปเดตระบบ</h2>
        
        <!-- ข้อความอธิบาย -->
        <div class="bg-white/5 border border-white/10 rounded-2xl p-6 mb-8 text-left">
            <p class="text-sm font-bold text-slate-300 leading-relaxed">
                ระบบการสอบสัมภาษณ์ (อัดเสียง) ได้ถูก <span class="text-accent font-black">ย้ายไปรวมกับหน้าระบบสอบทฤษฎี (30 ข้อ)</span> เรียบร้อยแล้ว เพื่อความสะดวกในการใช้งานแบบจุดเดียวจบ (Single Portal)
            </p>
            <p class="text-xs font-bold text-slate-400 mt-4 pt-4 border-t border-white/10">
                หากท่านต้องการทำแบบทดสอบอัดเสียง กรุณาคลิกปุ่มด้านล่างเพื่อไปยังหน้าแดชบอร์ดหลัก และทำการเข้าสู่ระบบครับ
            </p>
        </div>

        <!-- ปุ่มลิงก์กลับไปหน้า Unified System -->
        <a href="https://pltpdttb-jpg.github.io/certify/" class="flex items-center justify-center w-full bg-primary hover:bg-blue-600 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-sm btn-press shadow-[0_0_20px_rgba(58,134,255,0.4)]">
            ไปที่หน้าแดชบอร์ดหลัก 
            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </a>
        
    </div>

    <style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
